<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prayas JEE 2.0 2027 — Test Planner</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0D0D14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Prayas 2027"/>
<link rel="apple-touch-icon" href="icon-192.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D14;
  --bg2:#13131F;
  --bg3:#1A1A2E;
  --surface:#1F1F30;
  --surface2:#252538;
  --border:#2A2A40;
  --border2:#363655;
  --amber:#F5A623;
  --amber-dim:#B87D1A;
  --amber-bg:rgba(245,166,35,0.08);
  --amber-bg2:rgba(245,166,35,0.15);
  --text:#E8E8F0;
  --text2:#9999B3;
  --text3:#5A5A72;
  --jee-main:#5C9EF0;
  --jee-main-bg:rgba(92,158,240,0.12);
  --advanced:#C67AFF;
  --advanced-bg:rgba(198,122,255,0.12);
  --aits:#3DCCAA;
  --aits-bg:rgba(61,204,170,0.12);
  --danger:#FF6B6B;
  --success:#3DCC7A;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
  gap:16px;
  flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{
  width:36px;height:36px;
  background:var(--amber);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;
  color:#0D0D14;
  flex-shrink:0;
}
.brand-text h1{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:500;
  color:var(--text);
  line-height:1;
}
.brand-text span{
  font-size:11px;color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.08em;
}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* COUNTDOWN */
.countdown{
  display:flex;align-items:center;gap:8px;
  background:var(--amber-bg);
  border:1px solid var(--amber-dim);
  border-radius:8px;
  padding:6px 12px;
}
.countdown-label{font-size:11px;color:var(--amber);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em}
.countdown-days{font-size:18px;font-weight:600;color:var(--amber);font-family:'JetBrains Mono',monospace;line-height:1}
.countdown-sub{font-size:10px;color:var(--amber-dim)}

/* INSTALL BTN */
#installBtn{
  display:none;
  align-items:center;gap:6px;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text2);
  border-radius:8px;
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;font-family:'Inter',sans-serif;
  transition:all 0.2s;
}
#installBtn:hover{border-color:var(--amber);color:var(--amber)}
#installBtn svg{width:14px;height:14px}

/* FILTERS */
.filters{
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.filter-chip{
  padding:5px 12px;
  border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  font-size:12px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all 0.18s;
  white-space:nowrap;
}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.active{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}
.filter-chip.active.jm{border-color:var(--jee-main);background:var(--jee-main-bg);color:var(--jee-main)}
.filter-chip.active.adv{border-color:var(--advanced);background:var(--advanced-bg);color:var(--advanced)}
.filter-chip.active.aits{border-color:var(--aits);background:var(--aits-bg);color:var(--aits)}

/* MAIN LAYOUT */
.app{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* CALENDAR PANEL */
.cal-panel{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px 12px;
  flex-shrink:0;
}
.cal-month{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:500;
  color:var(--text);
}
.cal-year{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;color:var(--amber);
  margin-left:8px;
}
.nav-btns{display:flex;gap:6px}
.nav-btn{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
  font-size:16px;
}
.nav-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface)}
.today-btn{
  padding:0 14px;
  height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  font-size:12px;font-family:'Inter',sans-serif;
  transition:all 0.18s;
  margin-right:8px;
}
.today-btn:hover{color:var(--amber);border-color:var(--amber-dim)}

/* CALENDAR GRID */
.cal-wrap{flex:1;overflow-y:auto;padding:0 24px 24px}
.cal-wrap::-webkit-scrollbar{width:4px}
.cal-wrap::-webkit-scrollbar-track{background:transparent}
.cal-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.day-headers{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  margin-bottom:4px;
}
.day-header{
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text3);
  padding:4px;
  letter-spacing:0.08em;
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-cell{
  min-height:78px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px;
  cursor:default;
  transition:border-color 0.15s;
  position:relative;
  display:flex;
  flex-direction:column;
  gap:3px;
}
.cal-cell.other-month{opacity:0.3}
.cal-cell.today{border-color:var(--amber);background:var(--amber-bg)}
.cal-cell.today .cell-date{color:var(--amber)}
.cal-cell.has-test{cursor:pointer}
.cal-cell.has-test:hover{border-color:var(--border2);background:var(--surface)}
.cal-cell.selected{border-color:var(--advanced);background:var(--advanced-bg)}
.cell-date{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:500;
  color:var(--text3);
  line-height:1;
}
.today .cell-date{color:var(--amber)}
.test-pill{
  display:flex;align-items:center;gap:4px;
  border-radius:4px;
  padding:2px 6px;
  font-size:10px;font-weight:500;
  line-height:1.3;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.test-pill.jee-main{background:var(--jee-main-bg);color:var(--jee-main)}
.test-pill.jee-advanced{background:var(--advanced-bg);color:var(--advanced)}
.test-pill.aits{background:var(--aits-bg);color:var(--aits)}
.test-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.test-pill.jee-main .test-dot{background:var(--jee-main)}
.test-pill.jee-advanced .test-dot{background:var(--advanced)}
.test-pill.aits .test-dot{background:var(--aits)}
.done-mark{
  position:absolute;top:6px;right:6px;
  width:14px;height:14px;
  background:var(--success);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.done-mark svg{width:8px;height:8px;stroke:#000;stroke-width:2.5;fill:none}

/* DETAIL PANEL */
.detail-panel{
  width:380px;
  flex-shrink:0;
  border-left:1px solid var(--border);
  background:var(--bg2);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:width 0.3s ease;
}
.detail-panel.hidden{width:0;border-left:none}
.detail-inner{
  flex:1;
  overflow-y:auto;
  padding:24px;
}
.detail-inner::-webkit-scrollbar{width:4px}
.detail-inner::-webkit-scrollbar-track{background:transparent}
.detail-inner::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.detail-close{
  display:flex;justify-content:flex-end;
  margin-bottom:16px;
}
.close-btn{
  width:28px;height:28px;
  border-radius:6px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text3);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  transition:all 0.15s;
}
.close-btn:hover{color:var(--text);border-color:var(--border2)}

.detail-badge{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:6px;
  padding:4px 10px;
  font-size:11px;font-weight:500;
  margin-bottom:12px;
  letter-spacing:0.04em;
}
.detail-badge.jee-main{background:var(--jee-main-bg);color:var(--jee-main);border:1px solid rgba(92,158,240,0.25)}
.detail-badge.jee-advanced{background:var(--advanced-bg);color:var(--advanced);border:1px solid rgba(198,122,255,0.25)}
.detail-badge.aits{background:var(--aits-bg);color:var(--aits);border:1px solid rgba(61,204,170,0.25)}
.detail-badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.jee-main .detail-badge-dot{background:var(--jee-main)}
.jee-advanced .detail-badge-dot{background:var(--advanced)}
.aits .detail-badge-dot{background:var(--aits)}

.detail-name{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:500;
  color:var(--text);
  margin-bottom:4px;
  line-height:1.25;
}
.detail-date{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text3);
  margin-bottom:6px;
}
.detail-countdown{
  font-size:12px;color:var(--text2);
  margin-bottom:20px;
  display:flex;align-items:center;gap:6px;
}
.detail-countdown span{
  color:var(--amber);
  font-family:'JetBrains Mono',monospace;
  font-weight:500;
}

.done-toggle{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
  margin-bottom:20px;
  cursor:pointer;
  transition:all 0.18s;
}
.done-toggle:hover{border-color:var(--border2)}
.done-toggle.marked{border-color:var(--success);background:rgba(61,204,122,0.08)}
.toggle-check{
  width:18px;height:18px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all 0.18s;
}
.done-toggle.marked .toggle-check{border-color:var(--success);background:var(--success)}
.toggle-check svg{width:10px;height:10px;stroke:#0D0D14;stroke-width:2.5;fill:none;display:none}
.done-toggle.marked .toggle-check svg{display:block}
.toggle-label{font-size:13px;color:var(--text2)}
.done-toggle.marked .toggle-label{color:var(--success)}

.section-title{
  font-size:11px;
  font-weight:500;
  color:var(--text3);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.syllabus-section{margin-bottom:20px}
.subject-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:8px;
}
.subject-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  cursor:pointer;
  user-select:none;
}
.subject-name{
  font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;
}
.subject-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.phys .subject-dot{background:#5C9EF0}
.chem .subject-dot{background:#F0A25C}
.math .subject-dot{background:#A25CF0}
.subject-toggle{font-size:10px;color:var(--text3);transition:transform 0.2s}
.subject-toggle.open{transform:rotate(180deg)}
.subject-topics{
  padding:0 14px 12px;
  border-top:1px solid var(--border);
  display:none;
}
.subject-topics.open{display:block}
.topic-item{
  padding:5px 0;
  font-size:12px;
  color:var(--text2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:8px;
  line-height:1.4;
}
.topic-item:last-child{border-bottom:none}
.topic-item::before{
  content:'—';
  color:var(--text3);
  flex-shrink:0;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  margin-top:2px;
}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;
  color:var(--text3);
  text-align:center;
  padding:32px;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text2);margin-bottom:8px}
.empty-sub{font-size:13px;line-height:1.6;max-width:220px}

/* PROGRESS BAR */
.progress-row{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;
  padding:12px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
}
.progress-label{font-size:12px;color:var(--text2);white-space:nowrap}
.progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 0.4s ease}
.progress-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);white-space:nowrap}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* RESPONSIVE */
@media(max-width:768px){
  .detail-panel{
    position:fixed;bottom:0;left:0;right:0;
    width:100%!important;height:70vh;
    border-left:none;border-top:1px solid var(--border);
    z-index:100;border-radius:20px 20px 0 0;
    transform:translateY(100%);
    transition:transform 0.3s ease;
  }
  .detail-panel.open{transform:translateY(0)}
  .detail-panel.hidden{transform:translateY(100%);border:none}
  header{padding:12px 16px}
  .cal-nav{padding:12px 16px 8px}
  .cal-wrap{padding:0 12px 16px}
  .cal-cell{min-height:56px;padding:5px}
  .test-pill{font-size:9px;padding:2px 4px}
  .brand-text span{display:none}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">P</div>
    <div class="brand-text">
      <h1>Prayas JEE 2.0</h1>
      <span>TEST PLANNER 2027</span>
    </div>
  </div>

  <div class="header-right">
    <div class="countdown" id="mainCountdown">
      <div>
        <div class="countdown-label">NEXT TEST IN</div>
        <div class="countdown-days" id="countdownDays">—</div>
      </div>
      <div class="countdown-sub" id="countdownName">—</div>
    </div>

    <button id="installBtn" onclick="installApp()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Install App
    </button>
  </div>
</header>

<div style="display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;">
  <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-right:4px;">FILTER</span>
  <div class="filters" id="filterRow">
    <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All tests</button>
    <button class="filter-chip" data-filter="JEE Main" onclick="setFilter('JEE Main',this)">JEE Main</button>
    <button class="filter-chip" data-filter="JEE Advanced" onclick="setFilter('JEE Advanced',this)">JEE Advanced</button>
    <button class="filter-chip" data-filter="AITS" onclick="setFilter('AITS',this)">AITS</button>
  </div>

  <div id="progressContainer" style="margin-left:auto">
    <div class="progress-row" style="margin-bottom:0;padding:8px 14px">
      <span class="progress-label">Completed</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
  </div>
</div>

<div class="app">
  <div class="cal-panel">
    <div class="cal-nav">
      <div style="display:flex;align-items:baseline;gap:0">
        <span class="cal-month" id="calMonth">June</span>
        <span class="cal-year" id="calYear">2026</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="today-btn" onclick="goToday()">Today</button>
        <div class="nav-btns">
          <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">&#8249;</button>
          <button class="nav-btn" onclick="changeMonth(1)" aria-label="Next month">&#8250;</button>
        </div>
      </div>
    </div>

    <div class="cal-wrap">
      <div class="day-headers">
        <div class="day-header">SUN</div>
        <div class="day-header">MON</div>
        <div class="day-header">TUE</div>
        <div class="day-header">WED</div>
        <div class="day-header">THU</div>
        <div class="day-header">FRI</div>
        <div class="day-header">SAT</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <div class="detail-panel hidden" id="detailPanel">
    <div class="detail-inner">
      <div class="detail-close">
        <button class="close-btn" onclick="closeDetail()" aria-label="Close">&#10005;</button>
      </div>
      <div id="detailContent">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">Select a test</div>
          <div class="empty-sub">Click any highlighted date to view the full syllabus</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const TESTS = [

    physics:["Mathematical Tools (Complete Chapter)"],
    chemistry:[

      "Dalton's Atomic Theory, Atomic Mass, Atomic Mass Unit",
      "Mole and Molar Mass",
      "Average Atomic Mass"
    ],
    maths:["Basic Mathematics (Complete Chapter)"]
  },
  {
    id:2, name:"JEE Main-2", date:"2026-07-12", type:"JEE Main", pattern:"JEE Main",
    physics:[
      "Motion in a Straight Line (Complete Chapter)",
      "Motion in a Plane — Introduction, Motion in a plane, Projectile Motion, Relative Velocity, Circular motion"
    ],
    chemistry:["Some Basic Concepts of Chemistry (Complete Chapter)"],
    maths:["Quadratic Equations — Introduction, Common roots"]
  },
  {
    id:3, name:"JEE Advanced-1", date:"2026-07-26", type:"JEE Advanced", pattern:"JEE Advanced",
    physics:[
      "Motion in a Straight Line (Complete Chapter)",
      "Motion in a Plane (Complete Chapter)"
    ],
    chemistry:["Some Basic Concepts of Chemistry — Redox Reaction (Complete Chapter)"],
    maths:[
      "Basic Mathematics (Complete Chapter)",
      "Quadratic Equations (Complete Chapter)"
    ]
  },
  {
    id:4, name:"AITS-1", date:"2026-08-09", type:"AITS", pattern:"Main",
    physics:[
      "Motion in a Straight Line (Complete Chapter)",
      "Laws of Motion",
      "Work, Energy and Power",
      "Sequence and Series"
    ],
    chemistry:["Some Basic Concepts of Chemistry — Solutions"],
    maths:["Basic Maths (Complete Chapter)","Sequence and Series"]
  },
  {
    id:5, name:"JEE Main-3", date:"2026-08-23", type:"JEE Main", pattern:"JEE Main",
    physics:[
      "Laws of Motion (Complete Chapter)",
      "Work, Energy and Power (Complete Chapter)",
      "Circular Motion (Complete Chapter)",
      "Centre of Mass & System of Particles (Complete Chapter)"
    ],
    chemistry:[

// State
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let activeFilter = 'all';
let selectedTest = null;
let doneTests = JSON.parse(localStorage.getItem('prayas_done') || '[]');
let openSubjects = {};

const today = new Date();
today.setHours(0,0,0,0);

function getTypeClass(type){
  if(type==='JEE Main') return 'jee-main';
  if(type==='JEE Advanced') return 'jee-advanced';
  return 'aits';
}

function getFilteredTests(){
  if(activeFilter==='all') return TESTS;
  return TESTS.filter(t=>t.type===activeFilter);
}

function getTestsForDate(dateStr){
  const filtered = getFilteredTests();
  return filtered.filter(t=>t.date===dateStr);
}

function formatDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function daysUntil(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const diff = Math.ceil((d - today)/(1000*60*60*24));
  return diff;
}

function updateCountdown(){
  const upcoming = TESTS.filter(t=>{
    const d = new Date(t.date+'T00:00:00');
    return d >= today && !doneTests.includes(t.id);
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const el = document.getElementById('mainCountdown');
  const daysEl = document.getElementById('countdownDays');
  const nameEl = document.getElementById('countdownName');

  if(upcoming.length===0){
    el.style.display='none';
    return;
  }
  const next = upcoming[0];
  const days = daysUntil(next.date);
  daysEl.textContent = days===0 ? 'TODAY' : days===1 ? '1 day' : days+' days';
  nameEl.textContent = next.name;
  el.style.display='flex';
}

function updateProgress(){
  const total = TESTS.length;
  const done = doneTests.length;
  const pct = total>0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressCount').textContent = done+' / '+total;
}

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active','jm','adv','aits'));
  btn.classList.add('active');
  if(f==='JEE Main') btn.classList.add('jm');
  if(f==='JEE Advanced') btn.classList.add('adv');
  if(f==='AITS') btn.classList.add('aits');
  renderCalendar();
}

function renderCalendar(){
  const grid = document.getElementById('calGrid');
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent = monthNames[currentMonth];
  document.getElementById('calYear').textContent = currentYear;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  let cells = '';
  const totalCells = Math.ceil((firstDay + daysInMonth)/7)*7;

  for(let i=0; i<totalCells; i++){
    let day, month, year, otherMonth = false;
    if(i < firstDay){
      day = daysInPrev - firstDay + i + 1;
      month = currentMonth - 1;
      year = currentYear;
      if(month<0){month=11;year--;}
      otherMonth = true;
    } else if(i >= firstDay + daysInMonth){
      day = i - firstDay - daysInMonth + 1;
      month = currentMonth + 1;
      year = currentYear;
      if(month>11){month=0;year++;}
      otherMonth = true;
    } else {
      day = i - firstDay + 1;
      month = currentMonth;
      year = currentYear;
    }

    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cellDate = new Date(dateStr+'T00:00:00');
    const isToday = cellDate.getTime()===today.getTime();
    const tests = getTestsForDate(dateStr);
    const hasTest = tests.length>0;
    const isDone = hasTest && tests.every(t=>doneTests.includes(t.id));
    const isSelected = selectedTest && tests.some(t=>t.id===selectedTest.id);

    let classes = 'cal-cell';
    if(otherMonth) classes+=' other-month';
    if(isToday) classes+=' today';
    if(hasTest) classes+=' has-test';
    if(isSelected) classes+=' selected';

    let pillsHTML='';
    tests.forEach(t=>{
      const tc = getTypeClass(t.type);
      const shortName = t.name.replace('JEE ','').replace('Advanced','Adv.');
      pillsHTML+=`<div class="test-pill ${tc}"><div class="test-dot"></div>${shortName}</div>`;
    });

    const doneIcon = isDone ? `<div class="done-mark"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>` : '';

    const clickAttr = hasTest ? `onclick="selectTest('${dateStr}')"` : '';

    cells+=`<div class="${classes}" ${clickAttr}>${doneIcon}<div class="cell-date">${day}</div>${pillsHTML}</div>`;
  }
  grid.innerHTML = cells;
}

function selectTest(dateStr){
  const tests = getTestsForDate(dateStr);
  if(!tests.length) return;
  const test = tests[0];
  selectedTest = test;
  renderCalendar();
  showDetail(test);
}

function showDetail(test){
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('hidden');
  panel.classList.add('open');

  const isDone = doneTests.includes(test.id);
  const days = daysUntil(test.date);
  const typeClass = getTypeClass(test.type);

  let countdownText='';
  if(days<0) countdownText=`<span>${Math.abs(days)} days ago</span>`;
  else if(days===0) countdownText=`<span>Today!</span>`;
  else countdownText=`<span>${days}</span> days away`;

  let syllabusHTML='';
  const subjects=[
    {key:'physics',label:'Physics',cls:'phys'},
    {key:'chemistry',label:'Chemistry',cls:'chem'},
    {key:'maths',label:'Mathematics',cls:'math'}
  ];

  subjects.forEach(s=>{
    const topics = test[s.key]||[];
    const isOpen = openSubjects[test.id+'_'+s.key];
    syllabusHTML+=`
    <div class="subject-block">
      <div class="subject-header" onclick="toggleSubject(${test.id},'${s.key}')">
        <span class="subject-name ${s.cls}">
          <span class="subject-dot"></span>${s.label}
          <span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-weight:400">(${topics.length})</span>
        </span>
        <span class="subject-toggle ${isOpen?'open':''}">▼</span>
      </div>
      <div class="subject-topics ${isOpen?'open':''}">
        ${topics.map(t=>`<div class="topic-item">${t}</div>`).join('')}
      </div>
    </div>`;
  });

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-badge ${typeClass}">
      <span class="detail-badge-dot"></span>
      ${test.type} &nbsp;·&nbsp; ${test.pattern}
    </div>
    <div class="detail-name">${test.name}</div>
    <div class="detail-date">${formatDate(test.date)}</div>
    <div class="detail-countdown">${countdownText}</div>

    <div class="done-toggle ${isDone?'marked':''}" onclick="toggleDone(${test.id})">
      <div class="toggle-check">
        <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
      </div>
      <span class="toggle-label">${isDone?'Test completed ✓':'Mark as completed'}</span>
    </div>

    <div class="section-title">Syllabus</div>
    <div class="syllabus-section">${syllabusHTML}</div>
  `;
}

function toggleSubject(testId, subjectKey){
  const k = testId+'_'+subjectKey;
  openSubjects[k] = !openSubjects[k];
  if(selectedTest) showDetail(selectedTest);
}

function toggleDone(testId){
  if(doneTests.includes(testId)){
    doneTests = doneTests.filter(id=>id!==testId);
  } else {
    doneTests.push(testId);
  }
  localStorage.setItem('prayas_done', JSON.stringify(doneTests));
  updateProgress();
  updateCountdown();
  if(selectedTest && selectedTest.id===testId) showDetail(selectedTest);
  renderCalendar();
}

function closeDetail(){
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
  panel.classList.add('hidden');
  selectedTest = null;
  renderCalendar();
}

function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();
}

function goToday(){
  currentMonth = today.getMonth();
  currentYear = today.getFullYear();
  renderCalendar();
}

// PWA Install
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  btn.style.display = 'flex';
});

function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById('installBtn').style.display='none'; });
}

window.addEventListener('appinstalled', ()=>{ document.getElementById('installBtn').style.display='none'; });

// Register SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// Init
renderCalendar();
updateCountdown();
updateProgress();

// Auto-navigate to first upcoming test month
const nextTest = TESTS.find(t=>new Date(t.date+'T00:00:00')>=today);
if(nextTest){
  const d = new Date(nextTest.date+'T00:00:00');
  currentYear = d.getFullYear();
  currentMonth = d.getMonth();
  renderCalendar();
}
